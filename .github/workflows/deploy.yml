name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Triggers automatically when you push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Upload Production Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # This forces GitHub to host the compiled folder, NOT your raw files!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4